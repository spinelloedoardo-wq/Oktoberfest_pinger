name: Oktoberfest Augustiner Checker

on:
  workflow_dispatch: # Triggered by cron-job.org every 5 minutes

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit state.json back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Use the default GITHUB_TOKEN — no extra secrets needed for git push
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright
        run: pip install playwright && playwright install chromium --with-deps

      - name: Run checker
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM: ${{ secrets.TWILIO_FROM }}
          WA_TO: ${{ secrets.WA_TO }}
        run: python checker.py

      - name: Commit updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          # Only commit if state.json actually changed
          if git diff --staged --quiet; then
            echo "No state change — nothing to commit."
          else
            git commit -m "chore: update state [skip ci]"
            # Retry push up to 3 times in case of concurrent run conflict
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "Push attempt $i failed, retrying..."
              sleep $((i * 2))
            done
          fi
